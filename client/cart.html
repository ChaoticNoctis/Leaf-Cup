<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Leaf&Cup</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <!-- Header -->
  <header class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/"><img src="images/logo.png" alt="Leaf&Cup" height="70"></a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <a href="/catalog" class="btn btn-outline-success btn-sm"><i class="bi bi-arrow-left me-1"></i>Каталог</a>
        <a href="/cart" class="btn btn-outline-success position-relative">
          <i class="bi bi-bag"></i>
          <span class="cart-badge badge bg-danger" id="cartCount" style="display:none">0</span>
        </a>
        <div id="authBtn"><a href="/" class="btn btn-success btn-sm">Войти</a></div>
        <div id="userMenu" style="display:none">
          <div class="dropdown">
            <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle me-1"></i><span id="userNameHeader"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/account">Личный кабинет</a></li>
              <li id="adminMenuItem" style="display:none"><a class="dropdown-item" href="/admin">Панель администратора</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Выйти</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container py-5">
    <h2 class="fw-bold mb-4">Корзина</h2>
    <div class="row g-4" id="cartContent"></div>
  </div>

  <footer class="py-4 bg-dark text-white text-center">
    <div class="container"><p class="mb-0">&copy; 2025 Leaf&Cup. Все права защищены.</p></div>
  </footer>

  <!-- Модал оформления заказа -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Оформление заказа</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Адрес доставки</label>
            <input type="text" class="form-control" id="orderAddress" value="г. Челябинск, ул. Сезам, д. 7" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Способ оплаты</label>
            <select class="form-select" id="orderPayment">
              <option value="Картой">Картой онлайн</option>
              <option value="Наличными">Наличными при получении</option>
              <option value="СБП">СБП</option>
            </select>
          </div>
          <div id="orderSummary" class="bg-light rounded p-3 small"></div>
          <div id="orderError" class="alert alert-danger d-none mt-2"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-success w-100" onclick="placeOrder()">Подтвердить заказ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Модал успеха -->
  <div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="text-success fs-1 mb-2"><i class="bi bi-check-circle-fill"></i></div>
        <h5 class="fw-bold">Заказ оформлен!</h5>
        <p class="text-muted" id="successText"></p>
        <a href="/account" class="btn btn-success">Мои заказы</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const content = document.getElementById('cartContent');

      if (cart.length === 0) {
        content.innerHTML = `
          <div class="col-12 text-center py-5">
            <i class="bi bi-bag fs-1 text-muted"></i>
            <h5 class="mt-3 text-muted">Корзина пуста</h5>
            <a href="/catalog" class="btn btn-success mt-3">Перейти в каталог</a>
          </div>`;
        return;
      }

      const itemsHtml = cart.map(item => `
        <div class="d-flex align-items-center gap-3 py-3 border-bottom" id="cartItem_${item.productId}">
          <img src="${item.image}" alt="${item.name}" class="rounded" style="width:72px;height:72px;object-fit:cover;">
          <div class="flex-grow-1">
            <div class="fw-semibold">${item.name}</div>
            <div class="text-success fw-bold">${formatPrice(item.price)}</div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary btn-sm px-2" onclick="changeQty(${item.productId}, -1)"><i class="bi bi-dash"></i></button>
            <span class="fw-semibold" id="qty_${item.productId}">${item.qty}</span>
            <button class="btn btn-outline-secondary btn-sm px-2" onclick="changeQty(${item.productId}, 1)"><i class="bi bi-plus"></i></button>
          </div>
          <div class="fw-bold" style="min-width:80px;text-align:right" id="subtotal_${item.productId}">${formatPrice(item.price * item.qty)}</div>
          <button class="btn btn-outline-danger btn-sm" onclick="removeItem(${item.productId})"><i class="bi bi-trash"></i></button>
        </div>
      `).join('');

      const total = getCartTotal();

      content.innerHTML = `
        <div class="col-lg-8">
          <div class="bg-white rounded-3 shadow-sm p-4">
            <h5 class="fw-bold mb-3">Товары (${getCartCount()} шт.)</h5>
            ${itemsHtml}
          </div>
        </div>
        <div class="col-lg-4">
          <div class="bg-white rounded-3 shadow-sm p-4 sticky-top" style="top:100px">
            <h5 class="fw-bold mb-3">Итого</h5>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Товары (${getCartCount()} шт.)</span>
              <span>${formatPrice(total)}</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Доставка</span>
              <span class="text-success">Бесплатно</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
              <span>К оплате</span>
              <span class="text-success">${formatPrice(total)}</span>
            </div>
            <button class="btn btn-success w-100" onclick="openOrderModal()">Оформить заказ</button>
            <a href="/catalog" class="btn btn-outline-secondary w-100 mt-2">Продолжить покупки</a>
          </div>
        </div>`;
    }

    function changeQty(productId, delta) {
      const item = getCart().find(i => i.productId === productId);
      if (!item) return;
      const newQty = item.qty + delta;
      if (newQty < 1) { removeItem(productId); return; }
      updateQty(productId, newQty);
      document.getElementById('qty_' + productId).textContent = newQty;
      document.getElementById('subtotal_' + productId).textContent = formatPrice(item.price * newQty);
      updateCartBadge();
      renderCart();
    }

    function removeItem(productId) {
      removeFromCart(productId);
      renderCart();
    }

    function openOrderModal() {
      if (!currentUser) {
        alert('Пожалуйста, войдите в аккаунт для оформления заказа');
        window.location.href = 'index.html';
        return;
      }
      const cart = getCart();
      const summary = document.getElementById('orderSummary');
      summary.innerHTML = cart.map(i => `<div class="d-flex justify-content-between"><span>${i.name} × ${i.qty}</span><span>${formatPrice(i.price * i.qty)}</span></div>`).join('') +
        `<hr><div class="d-flex justify-content-between fw-bold"><span>Итого</span><span>${formatPrice(getCartTotal())}</span></div>`;
      new bootstrap.Modal(document.getElementById('orderModal')).show();
    }

    async function placeOrder() {
      const address = document.getElementById('orderAddress').value.trim();
      const payment = document.getElementById('orderPayment').value;
      const errEl   = document.getElementById('orderError');
      errEl.classList.add('d-none');
      if (!address) { errEl.textContent = 'Укажите адрес доставки'; errEl.classList.remove('d-none'); return; }
      if (!currentUser) { errEl.textContent = 'Войдите в аккаунт'; errEl.classList.remove('d-none'); return; }
      try {
        const items = getCart().map(i => ({ product_id: i.productId, name: i.name, price: i.price, quantity: i.qty }));
        const order = await OrderAPI.create(address, payment, items);
        clearCart();
        bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
        document.getElementById('successText').textContent = 'Заказ №' + order.id + ' принят. Ожидайте подтверждения.';
        new bootstrap.Modal(document.getElementById('successModal')).show();
        renderCart();
      } catch(e) {
        errEl.textContent = e.message;
        errEl.classList.remove('d-none');
      }
    }

    restoreSession().then(() => { updateCartBadge(); renderCart(); });
  </script>
</body>
</html>
