<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Акции — Leaf&Cup</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <header class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/"><img src="images/logo.png" alt="Leaf&Cup" height="70"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">О нас</a></li>
          <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
          <li class="nav-item"><a class="nav-link" href="/ceremonies">Чайные церемонии</a></li>
          <li class="nav-item"><a class="nav-link active" href="/sales">Акции</a></li>
        </ul>
        <a href="/cart" class="btn btn-outline-success me-2 position-relative">
          <i class="bi bi-bag"></i>
          <span class="cart-badge badge bg-danger" id="cartCount" style="display:none">0</span>
        </a>
        <div id="authBtn"><a href="/" class="btn btn-success">Войти</a></div>
        <div id="userMenu" style="display:none">
          <div class="dropdown">
            <button class="btn btn-outline-success dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-person-circle me-1"></i><span id="userNameHeader"></span></button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/account">Личный кабинет</a></li>
              <li id="adminMenuItem" style="display:none"><a class="dropdown-item" href="/admin">Панель администратора</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Выйти</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container py-5 text-center" style="min-height:400px;display:flex;align-items:center;justify-content:center;">
    <div>
      <div class="text-success mb-4" style="font-size:4rem"><i class="bi bi-gift"></i></div>
      <h3 class="fw-bold mb-3">Ожидайте скорых акций!</h3>
      <p class="text-muted">Следите за обновлениями — скоро здесь появятся выгодные предложения для любителей хорошего чая.</p>
      <a href="/catalog" class="btn btn-success mt-3">Перейти в каталог</a>
    </div>
  </div>

    <footer class="py-4 bg-dark text-white text-center mt-4">
    <div class="container"><p class="mb-0">&copy; 2025 Leaf&Cup. Все права защищены.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>restoreSession().then(() => updateCartBadge())</script>
</body>
</html>
